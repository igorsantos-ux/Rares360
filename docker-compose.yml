services:
  redis:
    image: redis:7-alpine
    # Removido ports para não expor à internet, acessível apenas na rede interna
    networks:
      - rares-internal
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  backend:
    build:
      context: ./backend
      dockerfile: ../infra/Dockerfile.backend
    ports:
      - "5000:3001"
    environment:
      PORT: 3001
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
    networks:
      - rares-internal
      - rares-public
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  frontend:
    build:
      context: ./frontend
      dockerfile: ../infra/Dockerfile.frontend
    ports:
      - "3000:80"
    networks:
      - rares-public
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

networks:
  rares-internal:
    internal: true
  rares-public:

volumes:
  redis-data:
